<style>

*{box-sizing:border-box;margin:0;padding:0}html,body{min-height:100%}body{font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;background:#e5e7eb;color:var(--text);min-height:100dvh;display:flex;justify-content:center;align-items:center;padding:18px;font-size:12px;font-weight:500}button{border:0;background:none;font:inherit;color:inherit}.summary-phone{width:clamp(390px,31vw,430px);max-width:100%;height:calc(100dvh - 36px);max-height:920px;border-radius:28px;background:var(--bg);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}.summary-scroll{flex:1;overflow-y:auto;padding:0 12px 18px;scrollbar-width:none}.summary-scroll::-webkit-scrollbar{display:none}.mobile-header{position:sticky;top:0;z-index:5;display:grid;grid-template-columns:38px 1fr 38px;align-items:center;padding:12px;background:rgba(255,255,255,.96);border-bottom:1px solid rgba(229,231,235,.85);backdrop-filter:blur(10px)}.icon-btn{width:34px;height:34px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid var(--border);color:#374151}.header-title{text-align:center}.header-title h1{font-size:15px;font-weight:500}.header-title span{display:block;margin-top:2px;color:var(--muted);font-size:10px}.segmented{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin:12px 0 10px;padding:4px;background:#eef2f7;border-radius:15px;border:1px solid #e2e8f0}.segmented button{min-height:31px;border-radius:11px;color:#64748b;font-size:11px;font-weight:500}.segmented button.active{background:#fff;color:var(--red);box-shadow:0 7px 14px rgba(15,23,42,.07)}.period-bar{display:flex;align-items:center;gap:9px;margin-bottom:11px}.nav-arrow{width:34px;height:34px;border-radius:13px;background:#fff;border:1px solid var(--border);color:#475569}.period-label{flex:1;min-height:38px;border-radius:14px;background:#fff;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;color:#374151;box-sh :#111827}.chart-tooltip span{display:block}.metric-card{position:relative;display:grid;grid-template-columns:42px 92px minmax(150px,1fr);gap:10px;align-items:center;overflow:hidden;min-height:104px}.metric-icon,.indicator-icon{display:flex;align-items:center;justify-content:center;border-radius:14px;background:var(--soft);color:var(--red);font-size:13px}.metric-icon{width:38px;height:38px}.metric-label{font-size:9px;color:var(--muted)}.metric-value{font-size:18px;line-height:1.1;margin-top:3px}.delta{font-size:9px;margin-top:4px}.up{color:var(--green)}.down{color:#dc2626}.metric-compare{font-size:8px;color:var(--muted);margin-top:2px}.metric-filter{position:absolute;right:10px;top:8px;z-index:2;padding:5px 8px;border-radius:9px;border:1px solid var(--border);font-size:9px;color:#475569;background:#fff}.mini-chart-wrap{position:relative;height:86px;min-width:0;width:100%;padding:16px 2px 0;align-self:stretch;overflow:visible}.mini-chart-wrap canvas{width:100%;height:70px!important;max-height:70px;display:block}.mini-tooltip{position:absolute;z-index:5;min-width:96px;padding:7px 8px;border-radius:10px;background:#111827;color:#fff;font-size:9px;line-height:1.35;box-shadow:0 10px 22px rgba(15,23,42,.22);pointer-events:none;opacity:0;transform:translate(-50%,-105%);transition:opacity .12s ease}.mini-tooltip.show{opacity:1}.rank-modal{position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;background:rgba(15,23,42,.34);backdrop-filter:blur(7px);opacity:0;transition:opacity .18s ease}.rank-modal.show{display:flex;opacity:1}.rank-sheet{width:min(320px,calc(100vw - 58px));max-height:66dvh;background:#fff;border-radius:18px;padding:14px 14px 16px;box-shadow:0 22px 48px rgba(15,23,42,.24);overflow:hidden;transform:translateY(10px) scale(.96);animation:rankSheetIn .2s ease-out forwards}@keyframes rankSheetIn{to{transform:translateY(0) scale(1)}}.rank-sheet-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}.rank-sheet-title{font-size:13px;font-weight:500}.rank-close{width:32px;height:32px;border-radius:12px;background:#f1f5f9;color:#334155}.rank-sheet-list{max-height:calc(66dvh - 76px);overflow:auto;display:flex;flex-direction:column;gap:7px;padding-right:2px}.rank-sheet-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;font-size:11px;padding:8px;border:1px solid #eef2f7;border-radius:11px}.ranking-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}.rank-card{background:#fff;border:1px solid var(--border);box-shadow:var(--shadow);border-radius:16px;padding:11px}.rank-title{display:flex;align-items:center;justify-content:space-between;gap:6px;font-size:11px;margin-bottom:9px}.rank-title small{font-size:8px;color:var(--muted)}.rank-list{display:flex;flex-direction:column;gap:7px}.rank-item{display:grid;grid-template-columns:18px 1fr auto;align-items:center;gap:5px;font-size:10px}.rank-num{width:18px;height:18px;border-radius:7px;background:#f1f5f9;color:#475569;display:flex;align-items:center;justify-content:center;font-size:9px}.rank-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.rank-value{color:#111827}.see-all{margin-top:9px;width:100%;min-height:28px;border-radius:10px;background:var(--soft);color:var(--red);font-size:10px}.indicator-head{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin:3px 0 9px}.indicator-head h2{font-size:14px;font-weight:500}.indicator-head p{font-size:9px;color:var(--muted);margin-top:2px}.indicator-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px;overflow:visible}.indicator-card{min-height:82px;background:#fff;border:1px solid var(--border);border-radius:9px;padding:9px;box-shadow:0 8px 18px rgba(15,23,42,.045);display:grid;grid-template-columns:30px 1fr;grid-template-rows:auto 1fr auto;column-gap:8px;align-items:start;justify-self:center;width:100%;transition:width .42s cubic-bezier(.22,1,.36,1),min-height .34s ease,box-shadow .32s ease,transform .32s ease,border-color .32s ease}.indicator-card.is-clickable{cursor:pointer}.indicator-card.is-expanded{position:relative;z-index:4;width:calc(300% + 14px);min-height:126px;border-color:#bbf7d0;box-shadow:0 16px 32px rgba(22,163,74,.13);transform:translateY(-1px)}.delivery-merged{grid-column:1 / -1;position:relative;z-index:4;height:82px;min-height:82px;display:block;border-color:#bbf7d0;box-shadow:0 16px 32px rgba(22,163,74,.13);transform-origin:center center;animation:deliveryPanelIn .42s cubic-bezier(.22,1,.36,1) both}.delivery-breakdown{height:100%;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px;overflow:hidden}.delivery-wh{min-width:0;padding:6px;border-radius:9px;background:#f8fafc;border:1px solid #eef2f7;display:flex;flex-direction:column;justify-content:center;opacity:0;animation:deliveryWarehouseIn .36s cubic-bezier(.22,1,.36,1) both}.delivery-wh:nth-child(1){animation-delay:.32s}.delivery-wh:nth-child(2){animation-delay:.42s}.delivery-wh:nth-child(3){animation-delay:.52s}.delivery-wh-name{font-size:8px;line-height:1.12;color:#64748b;min-height:0}.delivery-wh-value{font-size:15px;line-height:1.05;margin-top:4px;color:#111827}.delivery-wh-change{font-size:8px;margin-top:2px}@keyframes deliveryPanelIn{from{opacity:.92;transform:scaleX(.34)}to{opacity:1;transform:scaleX(1)}}@keyframes deliveryWarehouseIn{from{opacity:0;transform:translateY(10px) scale(.985)}to{opacity:1;transform:translateY(0) scale(1)}}.indicator-icon{width:30px;height:30px;grid-row:1 / span 3}.indicator-body{min-width:0}.indicator-label{font-size:9px;line-height:1.2;color:#4b5563;white-space:normal}.indicator-value{font-size:18px;line-height:1.05;margin-top:7px}.indicator-change{font-size:9px;margin-top:4px}.progress-card{grid-column:1 / -1;min-height:94px;grid-template-columns:34px 1fr}.progress-card .indicator-icon{width:34px;height:34px}.progress-row{display:flex;align-items:center;justify-content:space-between;gap:12px}.progress-bar{wid body.summary-embed{display:block;align-items:stretch;justify-content:stretch;padding:0;background:var(--bg);min-height:100dvh}
body.summary-embed .summary-phone{width:100%;max-width:none;height:100dvh;max-height:none;border-radius:0;box-shadow:none}

</head>
<body>
<script>
if(new URLSearchParams(window.location.search).has("embed")){
  document.body.classList.add("summary-embed");
}
</script>

<main class="summary-phone">
<header class="mobile-header">
  <button class="icon-btn" type="button" onclick="history.length>1?history.back():window.location.href='/'">&lt;</button>
  <div class="header-title"><h1>Summary</h1><span>Dashboard Retur</span></div>
  <div></div>
</header>
<section class="summary-scroll">
  <div class="segmented" id="modeTabs">
    <button type="button" data-mode="harian" class="active">Harian</button>
    <button type="button" data-mode="bulanan">Bulanan</button>
    <button type="button" data-mode="akumulasi">Akumulasi</button>
  </div>
  <div class="period-bar">
    <button class="nav-arrow" type="button" onclick="shiftPeriod(-1)">&lt;</button>
    <div class="period-label" id="periodControl">Memuat data...</div>
    <button class="nav-arrow" type="button" onclick="shiftPeriod(1)">&gt;</button>
  </div>
  <article class="summary-card">
    <div class="chart-head"><div><div class="card-title">Grafik Scan</div><div class="chart-legend"><span><i class="legend-dot legend-blue"></i>Scan Pack</span><span><i class="legend-dot legend-green"></i>Scan Delivery</span><span><i class="legend-dot legend-orange"></i>Sudah Terima</span></div></div><div class="card-sub" id="chartSubtitle">Memuat data...</div></div>
    <div class="chart-stage" id="chartStage"><canvas class="chart-axis" id="scanAxis"></canvas><div class="chart-wrap" id="scanChartWrap"><canvas id="scanChart"></canvas></div><div class="chart-tooltip" id="chartTooltip"></div></div>
  </article>
  <article class="summary-card metric-card">
    <div class="metric-icon">K</div>
    <div>
      <div class="metric-label" id="kodeLabelText">Total Karung</div>
      <div class="metric-value" id="kodeTotal">0</div>
      <div class="delta up" id="kodeDelta">0%</div>
      <div class="metric-compare" id="kodeCompare">Dibanding periode sebelumnya</div>
    </div>
    <div class="mini-chart-wrap" id="miniChartWrap"><canvas id="kodeMiniChart"></canvas><div class="mini-tooltip" id="miniTooltip"></div></div>
    <button class="metric-filter" type="button" id="metricMode">Bulanan</button>
  </article>
  <section class="ranking-grid">
    <article class="rank-card"><div class="rank-title"><span>Top by Seller</span><small id="sellerPeriod">-</small></div><div class="rank-list" id="topSellerList"></div><button class="see-all" type="button" onclick="openRankModal('seller')">Lihat Semua</button></article>
    <article class="rank-card"><div class="rank-title"><span>Top by Implant</span><small id="implantPeriod">-</small></div><div class="rank-list" id="topImplantList"></div><button class="see-all" type="button" onclick="openRankModal('implant')">Lihat Semua</button></article>
  </section>
  <section>
    <div class="indicator-head"><div><h2>Indikator Summary</h2><p id="updateLabel">Data real dari dashboard</p></div></div>
    <div class="indicator-grid" id="indicatorGrid"></div>
  </section>
</section>
</main>
<div class="rank-modal" id="rankModal"><div class="rank-sheet"><div class="rank-sheet-head"><div><div class="rank-sheet-title" id="rankModalTitle">Ranking</div><div class="card-sub" id="rankModalPeriod">-</div></div><button class="rank-close" type="button" onclick="closeRankModal()">x</button></div><div class="rank-sheet-list" id="rankModalList"></div></div></div>
<script>
const summaryParams=new URLSearchParams(window.location.search);const requestedMode=summaryParams.get("mode")||"harian";const formatNumber=new Intl.NumberFormat("id-ID");let currentMode=["harian","bulanan","akumulasi"].includes(requestedMode)?requestedMode:"harian";let selectedPeriod=summaryParams.get("selected")||"";let expandedIndicator="";let chartHitPoints=[];let miniHitPoints=[];let summaryData={labels:[],scanPack:[],scanDelivery:[],terimaSeller:[],mini:[],topSeller:[],topImplant:[],indicators:{}};
const indicatorConfig=[["totalKode","Total Karung","K","c-blue",8.2],["totalResi","Resi (Karung)","R","c-green",6.7],["resiTanpaKode","Resi (Ecer)","E","c-orange",-12.5],["resiAbnormal","Resi (Abnormal)","A","c-red",-6],["totalSeller","Total Seller","S","c-green",7.1],["totalImplant","Total Implant","I","c-blue",5.3],["totalComplaint","Total Complaint","C","c-red",-6],["totalAutoclaim","Total Autoclaim","AC","c-green",0],["scanPack","Scan Pack","P","c-blue",6.9],["scanDelivery","Scan Delivery","D","c-green",7.2],["terimaSeller","Scan Tanda Terima","T","c-green",8.3],["selisihHv","Selisih HV","HV","c-red",-1.5],["selisihDelivery","Selisih Delivery","SD","c-orange",3.4],["proses","Belum Terima","@","c-orange",-4.3],["sudahTerima","Sudah Terima","ST","c-green",9.8],["progress","Progress","%","c-green",2.5]];
function valueText(v){return typeof v==="string"?v:formatNumber.format(Number(v||0))}
function setActiveTabs(){document.querySelectorAll("[data-mode]").forEach(btn=>btn.classList.toggle("active",btn.dataset.mode===currentMode))}
async function loadSummary(){setActiveTabs();const stage=document.getElementById("chartStage");if(stage)stage.classList.add("loading");renderPeriodControl(true);const params=new URLSearchParams({mode:currentMode});if(selectedPeriod)params.set("selected",selectedPeriod);const res=await fetch(`/summary_data?${params.toString()}`,{cache:"no-store"});if(!res.ok)throw new Error("Gagal memuat summary");summaryData=await res.json();selectedPeriod=summaryData.activePeriod||selectedPeriod;renderSummary();requestAnimationFrame(()=>{const stage=document.getElementById("chartStage");if(stage)stage.classList.remove("loading")})}
function drawSmoothLine(ctx,points,color,dots=false,progress=1){if(points.length<2)return;const left=points[0].x,right=points[points.length-1].x,limit=left+(right-left)*Math.max(0,Math.min(1,progress));ctx.save();ctx.beginPath();ctx.rect(left-4,0,Math.max(0,limit-left)+8,10000);ctx.clip();ctx.beginPath();ctx.moveTo(points[0].x,points[0].y);for(let i=1;i<points.length;i++){const prev=points[i-1],cur=points[i],mid=(prev.x+cur.x)/2;ctx.bezierCurveTo(mid,prev.y,mid,cur.y,cur.x,cur.y)}ctx.strokeStyle=color;ctx.lineWidth=2.3;ctx.lineCap="round";ctx.lineJoin="round";ctx.stroke();if(dots){points.forEach(p=>{if(p.x>limit+4)return;ctx.beginPath();ctx.arc(p.x,p.y,2.3,0,Math.PI*2);ctx.fillStyle=color;ctx.fill()})}ctx.restore()}
function setupCanvas(canvas,width,height){const ratio=window.devicePixelRatio||1,w=width||canvas.clientWidth||320,h=height||canvas.clientHeight||210;canvas.style.width=w+"px";canvas.style.height=h+"px";canvas.width=Math.floor(w*ratio);canvas.height=Math.floor(h*ratio);const ctx=canvas.getContext("2d");ctx.setTransform(ratio,0,0,ratio,0,0);ctx.clearRect(0,0,w,h);return{ctx,w,h}}
